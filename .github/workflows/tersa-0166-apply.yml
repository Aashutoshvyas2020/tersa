name: Apply Tersa 0.16.6 hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: tersa-0166-apply
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: release/tersa-0.16.6-production

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: .bun-version

      - name: Reconstruct and apply hardening patch
        shell: bash
        run: |
          set -uo pipefail
          rm -f reports/0166-patch-failure.log
          {
            sha256sum scripts/.prepare-0166-*.b64
            cat scripts/.prepare-0166-*.b64 | base64 --decode > scripts/prepare-0.16.6.py
            sha256sum scripts/prepare-0.16.6.py
            python3 -m py_compile scripts/prepare-0.16.6.py
            python3 scripts/prepare-0.16.6.py
            rm -f scripts/.prepare-0166-*.b64
          } 2>&1 | tee patch.log
          exit ${PIPESTATUS[0]}

      - name: Persist patch failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports
          cp patch.log reports/0166-patch-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/0166-patch-failure.log
          git commit -m "ci: persist 0.16.6 patch failure"
          git push origin HEAD:release/tersa-0.16.6-production

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Production typecheck
        run: bun run typecheck:production

      - name: Reported-issue regression suite
        run: bun test --max-concurrency=1 scripts/tersa-0166-regressions.test.ts

      - name: Full Tersa release gate
        run: bun run verify:tersa:release

      - name: Packed npm clean-install gate
        run: bun run release:npm:dry-run

      - name: Commit verified release candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "release(0.16.6): apply production hardening"
          git push origin HEAD:release/tersa-0.16.6-production
