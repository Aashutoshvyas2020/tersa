name: Production Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CLAUDE_CODE_USE_OPENAI: "0"

jobs:
  release-candidate:
    name: macOS release candidate
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run production release gate
        run: bun run verify:tersa:release

      - name: Verify packed npm installation
        run: bun run release:npm:dry-run

      - name: Scan changed code for suspicious intent
        env:
          PR_SCAN_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          PR_SCAN_HEAD: ${{ github.sha }}
        run: bun run security:pr-scan -- --base "$PR_SCAN_BASE" --head "$PR_SCAN_HEAD"
