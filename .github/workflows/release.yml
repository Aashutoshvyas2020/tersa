name: Publish npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    if: ${{ github.repository == 'Aashutoshvyas2020/tersa' }}
    name: Validate macOS package
    runs-on: macos-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          expected="v$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "$expected" || {
            echo "Tag $GITHUB_REF_NAME does not match package version $expected" >&2
            exit 1
          }

      - name: Run production release gate
        run: bun run verify:tersa:release

      - name: Verify packed npm installation
        run: bun run release:npm:dry-run

  publish:
    name: Publish tersa-cli
    needs: validate
    runs-on: macos-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Clear token auth for trusted publishing
        run: |
          unset NODE_AUTH_TOKEN
          echo "NODE_AUTH_TOKEN=" >> "$GITHUB_ENV"

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Verify npm latest
        run: |
          expected="$(node -p "require('./package.json').version")"
          for attempt in $(seq 1 30); do
            actual="$(npm view tersa-cli@latest version 2>/dev/null || true)"
            echo "Attempt $attempt: expected=$expected actual=${actual:-<empty>}"
            test "$actual" = "$expected" && exit 0
            sleep 10
          done
          exit 1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "Tersa $GITHUB_REF_NAME"
