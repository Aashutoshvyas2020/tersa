name: Tersa 0.16.6 audit

on:
  push:
    branches:
      - release/tersa-0.16.6-production
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Locate reported production leaks
        shell: bash
        run: |
          set -uo pipefail
          echo '=== task-state strings ==='
          rg -n -i 'high-level task|concrete next step|knowledge graph|project state' src scripts || true
          echo '=== legacy product surfaces ==='
          rg -n -i 'claude in chrome|auto-connect.*ide|copy claude|exit the repl|dream|team memory' src scripts || true
          echo '=== slash filtering ==='
          rg -n 'filter.*command|command.*filter|slash.*suggest|suggest.*slash|startsWith\(' src/components src/utils | head -n 250 || true
          echo '=== spinner tips ==='
          rg -n 'spinnerTip|spinner tips|Did you know|Use /' src/components src/constants src/utils | head -n 250 || true
          echo '=== provider recommendation labels ==='
          rg -n -i 'recommended|codex oauth|advanced provider' src/components src/commands src/integrations | head -n 250 || true
          echo '=== relevant paths ==='
          find src -type f \( -iname '*knowledge*' -o -iname '*dream*' -o -iname '*suggest*' -o -iname '*provider*' -o -iname '*tip*' \) | sort
