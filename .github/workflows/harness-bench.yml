name: Harness Bench Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "research/harness-bench/**"
      - "research/README.md"
      - ".github/workflows/harness-bench.yml"
  push:
    branches:
      - main
    paths:
      - "research/harness-bench/**"
      - "research/README.md"
      - ".github/workflows/harness-bench.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: research/harness-bench

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v7.2.1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Validate Harbor configs
        run: uv run python scripts/validate_configs.py

      - name: Run tests
        run: uv run pytest

      - name: Run Ruff
        run: uv run ruff check .
