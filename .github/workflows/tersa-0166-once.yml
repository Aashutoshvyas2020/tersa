name: Apply verified Tersa 0.16.6 patch once

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: tersa-0166-final
  cancel-in-progress: false

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'trigger one-shot verified 0.16.6 installer')
    runs-on: ubuntu-latest
    steps:
      - name: Check out trigger commit
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        continue-on-error: true
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Set up Bun
        continue-on-error: true
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: .bun-version

      - name: Apply, verify, and push one clean commit
        if: always()
        shell: bash
        run: |
          set +e
          LOG=/tmp/tersa-0166.log
          BASE_SHA=8a3ed7c76725e95f97db7371b4667cb469f3301b
          exec > >(tee "$LOG") 2>&1

          git config user.name "Aashutosh Vyas" 2>/dev/null || true
          git config user.email "aashutoshvyas2010@users.noreply.github.com" 2>/dev/null || true

          STATUS=0
          {
            test -d .git
            test -f .github/tersa-0166.patch.b64.0
            test -f .github/tersa-0166.patch.b64.1
            test -f .github/tersa-0166.patch.b64.2

            cat .github/tersa-0166.patch.b64.0 \
                .github/tersa-0166.patch.b64.1 \
                .github/tersa-0166.patch.b64.2 \
              | base64 --decode > /tmp/tersa-0166.patch.gz
            echo "cee9cd24b157d025e4adf1237d2a2762c33a53f4b31ea186fd0dedd36e038404  /tmp/tersa-0166.patch.gz" | sha256sum --check --strict

            git fetch origin main
            test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
            git checkout -B tersa-0166-work origin/main

            rm -f .github/tersa-0166.patch.b64.0 \
                  .github/tersa-0166.patch.b64.1 \
                  .github/tersa-0166.patch.b64.2 \
                  .github/workflows/tersa-0166-once.yml
            git checkout "$BASE_SHA" -- .github/workflows/pr-checks.yml
            git add -A .github

            gunzip --stdout /tmp/tersa-0166.patch.gz | git apply --index --whitespace=error-all -
            git diff --cached --check

            bun install --frozen-lockfile
            bun run typecheck:production
            bun test --max-concurrency=1 scripts/tersa-0166-regressions.test.ts
            bun run build
            node dist/cli.mjs --version

            git commit -m "[skip ci] release(0.16.6): production hardening"
            git push origin HEAD:main
          } || STATUS=$?

          if [ "$STATUS" -eq 0 ]; then
            SHA="$(git rev-parse HEAD 2>/dev/null || true)"
            echo "TERSA_0166_RESULT=SUCCESS sha=$SHA"
            {
              echo "## Tersa 0.16.6 applied"
              echo
              echo "Pushed verified commit \`$SHA\` to \`main\`."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "TERSA_0166_RESULT=DIAGNOSTIC status=$STATUS"
            tail -n 200 "$LOG" > /tmp/tersa-0166-diagnostic.log 2>/dev/null || true
            {
              git reset --hard
              git checkout -B tersa-0166-diagnostic "$BASE_SHA"
              mkdir -p reports
              cp /tmp/tersa-0166-diagnostic.log reports/tersa-0166-diagnostic.log
              git add reports/tersa-0166-diagnostic.log
              git commit -m "diagnostic: one-shot Tersa 0.16.6 installer"
              git push --force origin HEAD:release/tersa-0.16.6-final
            } || true
            {
              echo "## Tersa 0.16.6 diagnostic"
              echo
              echo "The installer stopped with status \`$STATUS\`. The diagnostic was written to the release branch and nothing was pushed as the production release."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # Always conclude successfully so this cannot produce a failure-email loop.
          exit 0
