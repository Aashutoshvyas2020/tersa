# DRAFT: same Tersa profile ablation on the OpenAI model island.
# Every arm retains identical GSD and Superpowers inputs.
job_name: tbench2-tersa-profile-ablation-openai
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 4
environment:
  type: docker
agents:
  - import_path: harness_bench.agents.tersa:TersaAgent
    model_name: openai/gpt-5.5
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
      cave_mode: true
  - import_path: harness_bench.agents.tersa:TersaNoCaveAgent
    model_name: openai/gpt-5.5
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
  - import_path: harness_bench.agents.tersa:TersaPonytailAgent
    model_name: openai/gpt-5.5
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
      - ./.bench-skills/ponytail
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
      cave_mode: true
  - import_path: harness_bench.agents.tersa:TersaKarpathyAgent
    model_name: openai/gpt-5.5
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
      - ./.bench-skills/karpathy-guardrails
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
      cave_mode: true
datasets:
  - name: terminal-bench/terminal-bench-2
    n_tasks: 10
