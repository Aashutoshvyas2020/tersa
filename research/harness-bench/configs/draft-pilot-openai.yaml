# DRAFT: clean same-model harness comparison. Tersa is deliberately bare here;
# workflow/profile effects belong in draft-tersa-ablation-claude.yaml.
job_name: tbench2-pilot-openai-island
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 4
environment:
  type: docker
agents:
  - import_path: harness_bench.agents.tersa:TersaBareAgent
    model_name: openai/gpt-5.5
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
      cave_mode: true
  - name: codex
    model_name: openai/gpt-5.5
  - name: opencode
    model_name: openai/gpt-5.5
  - name: pi
    model_name: openai/gpt-5.5
datasets:
  - name: terminal-bench/terminal-bench-2
    n_tasks: 10
