# DRAFT: profile ablation. Every arm includes the identical pinned GSD and
# Superpowers skill set. CAVE, Ponytail, and Karpathy are changed one at a time.
# Replace n_tasks with a preregistered explicit task list before publication.
job_name: tbench2-tersa-profile-ablation-claude
jobs_dir: jobs
n_attempts: 3
n_concurrent_trials: 4
environment:
  type: docker
agents:
  - import_path: harness_bench.agents.tersa:TersaAgent
    model_name: anthropic/claude-opus-4-6
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
      cave_mode: true
  - import_path: harness_bench.agents.tersa:TersaNoCaveAgent
    model_name: anthropic/claude-opus-4-6
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
  - import_path: harness_bench.agents.tersa:TersaPonytailAgent
    model_name: anthropic/claude-opus-4-6
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
      - ./.bench-skills/ponytail
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
      cave_mode: true
  - import_path: harness_bench.agents.tersa:TersaKarpathyAgent
    model_name: anthropic/claude-opus-4-6
    skills:
      - ./.bench-skills/superpowers
      - ./.bench-skills/gsd
      - ./.bench-skills/karpathy-guardrails
    kwargs:
      version: "0.16.5"
      max_turns: 100
      permission_mode: bypassPermissions
      cave_mode: true
datasets:
  - name: terminal-bench/terminal-bench-2
    n_tasks: 10
